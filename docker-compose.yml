version: '3.8'

services:
  meal-planner:
    build: .
    ports:
      - "3001:3001"
    volumes:
      # 持久化数据库文件
      - meal-data:/app/data
      # 持久化上传的图片
      - meal-uploads:/app/uploads
    environment:
      - NODE_ENV=production
      - PORT=3001
    restart: unless-stopped

volumes:
  meal-data:
  meal-uploads:
